<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 · 小绿书</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
  <div class="auth-split">
    <div class="left">
      <div class="auth-brand-top" style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <div style="display:flex;align-items:center;gap:0.625rem">
          <span class="logo-sq">N</span>
          <span style="font-weight:700;font-size:0.875rem;color:#F5F5F0;letter-spacing:1.6px">小绿书</span>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:0.6875rem;color:#5A5C68;letter-spacing:1.5px">v0.4.7</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:1.5rem">
        <div class="hero-kicker">⊹  开个账号  ·  四步走完</div>
        <div class="hero-title" style="font-size:5rem;max-width:520px">先有名字,<br>再写故事。</div>
        <div class="hero-desc">用户名将是你的主页地址,<br>请挑一个三年后还不会脸红的。</div>
        <div style="display:flex;flex-direction:column;gap:0.625rem">
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.8125rem;color:#9A9CA8">
            <span style="color:#D4FF3D">✓</span> 无需邮箱验证
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.8125rem;color:#9A9CA8">
            <span style="color:#D4FF3D">✓</span> 自动分配主页
          </div>
          <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.8125rem;color:#9A9CA8">
            <span style="color:#D4FF3D">✓</span> 即时发布
          </div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
        <div style="display:flex;flex-direction:column;gap:0.375rem">
          <span style="font-family:'JetBrains Mono',monospace;font-size:0.6875rem;color:#5A5C68">基于 ES Modules 构建</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:0.6875rem;color:#5A5C68">零构建 · 零依赖</span>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:3rem;color:#D4FF3D">⊕</span>
      </div>
    </div>
    <div class="right">
      <div class="auth-card">
        <div class="auth-head">
          <div style="display:flex;flex-direction:column;gap:0.375rem">
            <span class="auth-head-label">步骤  02 / 02</span>
            <h1 style="font-size:2rem;font-weight:700;color:#F5F5F0;letter-spacing:-1px;line-height:1;margin:0">创建账号</h1>
          </div>
          <div style="display:flex;align-items:center;gap:0.25rem">
            <span style="width:6px;height:6px;background:#D4FF3D;border-radius:100px;display:inline-block"></span>
            <span style="width:6px;height:6px;background:#D4FF3D;border-radius:100px;display:inline-block"></span>
            <span style="width:6px;height:6px;background:#26283A;border-radius:100px;display:inline-block"></span>
            <span style="width:6px;height:6px;background:#26283A;border-radius:100px;display:inline-block"></span>
          </div>
        </div>
        <form id="register-form" style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="auth-field">
            <div class="auth-field-hd">
              <label class="form-label" for="username">⌗  用户名</label>
            </div>
            <input class="form-input" id="username" name="username" type="text" autocomplete="username" required minlength="4" maxlength="32" placeholder="用户名">
            <div class="form-hint" id="username-hint"></div>
          </div>
          <div class="auth-field">
            <label class="form-label" for="name">⌗  昵称  ·  显示名称</label>
            <input class="form-input" id="name" name="name" type="text" required minlength="1" maxlength="64" placeholder="昵称">
            <div class="form-hint" id="name-hint"></div>
          </div>
          <div class="auth-field">
            <div class="auth-field-hd">
              <label class="form-label" for="password">⌗  密码</label>
            </div>
            <input class="form-input" id="password" name="password" type="password" autocomplete="new-password" required minlength="8" maxlength="64" placeholder="密码">
            <div class="form-hint" id="password-hint"></div>
          </div>
          <div class="auth-field">
            <label class="form-label" for="password2">⌗  再输一次</label>
            <input class="form-input" id="password2" name="password2" type="password" autocomplete="new-password" required minlength="8" maxlength="64" placeholder="确认密码">
            <div class="form-hint" id="password2-hint"></div>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem" id="submit-btn">
            <span>创建主页</span>
            <span>⊕</span>
          </button>
        </form>
      </div>
    </div>
  </div>
  <script type="module" src="assets/js/pages/register.js?v=5"></script>
</body>
</html>
